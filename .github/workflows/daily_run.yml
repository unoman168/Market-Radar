name: 晨會戰情機器人自動排程

on:
  schedule:
    - cron: '15 23 * * *'
  workflow_dispatch: 

jobs:
  run-report:
    runs-on: ubuntu-latest
    steps:
      - name: 下載程式碼
        uses: actions/checkout@v3

      - name: 設定 Python 環境
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'  # 🌟 升級到 Python 3.11 解決版本警告

      - name: 安裝中文字型 (解決圖表亂碼)
        run: sudo apt-get update && sudo apt-get install -y fonts-noto-cjk

      - name: 安裝所需套件 (🌟 新增 praw 並升級為最新版 google-genai)
        run: |
          pip install yfinance pandas plotly requests feedparser gspread google-auth pytz kaleido==0.2.1 google-genai praw
          
      - name: 執行報表與發送 LINE
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          LINE_ACCESS_TOKEN: ${{ secrets.LINE_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
        run: python daily_report.py
