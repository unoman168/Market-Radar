name: 晨會戰情機器人自動排程

on:
  schedule:
    # 這是 UTC 時間。23:15 UTC 等於台灣時間早上 07:15
    - cron: '15 23 * * *'
  workflow_dispatch: # 保留這個按鈕，讓你可以隨時手動點擊測試

jobs:
  run-report:
    runs-on: ubuntu-latest
    steps:
      - name: 下載程式碼
        uses: actions/checkout@v3

      - name: 設定 Python 環境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 安裝所需套件
        run: |
          pip install yfinance pandas plotly requests feedparser gspread google-auth pytz kaleido==0.2.1
          
      - name: 執行報表與發送 LINE
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          LINE_ACCESS_TOKEN: ${{ secrets.LINE_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: python daily_report.py
